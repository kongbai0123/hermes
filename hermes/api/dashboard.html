<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent OS - Cyber Codex</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff00ff;
            --bg: #050505;
            --card: #0c0c0c;
            --border: #1a1a1a;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --sidebar-width: 320px;
        }

        /* === Chinese Font Repair Layer === */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        /* 中文區塊強制使用繁中字型 */
        label, select, option, textarea, button, #cyber-tooltip, .popup-item, span {
            font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Segoe UI", sans-serif !important;
            letter-spacing: 0 !important;
        }

        /* 英文 Cyber 字型只給專門的英文 UI 元件 */
        .logo-en, .cyber-en, .terminal-en, .en-title {
            font-family: "Orbitron", "Share Tech Mono", "Rajdhani", sans-serif !important;
            letter-spacing: 1px !important;
        }

        /* Sidebar & Resizer */
        .sidebar {
            width: var(--sidebar-width);
            min-width: 200px;
            max-width: 500px;
            background: rgba(1, 4, 9, 0.95);
            border-right: 2px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            position: relative;
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }
        .resizer {
            width: 5px;
            cursor: col-resize;
            background: transparent;
            transition: 0.3s;
        }
        .resizer:hover { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            min-width: 0;
        }

        /* Cyberpunk Headers */
        .header-container {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .logo-en { color: var(--primary); font-size: 1.5em; text-shadow: 0 0 8px var(--primary); font-weight: 900; }
        .logo-zh { color: var(--text); font-size: 1.2em; font-weight: 700; margin-left: 5px; }

        /* Global Cyber Tooltip */
        #cyber-tooltip {
            position: fixed;
            display: none;
            background: rgba(0, 0, 0, 0.98);
            border: 1px solid var(--secondary);
            color: #ff3cff; /* 降低中文亮度，提升可讀性 */
            padding: 12px;
            font-size: 12px;
            border-radius: 4px;
            z-index: 1000;
            width: 260px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.35); /* 發光給容器 */
            pointer-events: none;
            line-height: 1.6;
            white-space: pre-wrap;
            text-shadow: 0 0 4px rgba(255, 0, 255, 0.45); /* 輕微陰影 */
        }

        /* Status Indicator & Spinner */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            background: rgba(0, 242, 255, 0.08);
            padding: 4px 10px;
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: var(--primary);
            margin-left: 10px;
            opacity: 0;
            transition: 0.5s;
            pointer-events: none;
        }
        .status-indicator.active { 
            opacity: 1; 
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            animation: pulse-glow 2s infinite;
        }
        .spinner {
            width: 10px;
            height: 10px;
            border: 2px solid var(--primary);
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: cyber-spin 1s linear infinite;
        }
        @keyframes cyber-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }

        /* 不要用 Unicode，改用 CSS Dot */
        .neon-dot {
            width: 8px;
            height: 8px;
            background: var(--secondary);
            transform: rotate(45deg);
            display: inline-block;
            box-shadow: 0 0 6px var(--secondary), 0 0 12px var(--secondary);
            cursor: pointer;
        }

        /* Controls */
        .setting-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85em; color: #8b949e; text-transform: uppercase; }
        select, input, textarea {
            background: #111;
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 10px;
            border-radius: 4px;
        }
        .prompt-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .mini-action-btn {
            background: rgba(0, 242, 255, 0.08);
            border: 1px solid rgba(0, 242, 255, 0.35);
            color: var(--primary);
            cursor: pointer;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 4px;
        }
        .mini-action-btn:hover {
            background: rgba(0, 242, 255, 0.16);
        }
        .mini-action-btn.danger {
            border-color: rgba(255, 0, 255, 0.4);
            color: var(--secondary);
        }
        .prompt-save-status {
            color: #8b949e;
            font-size: 11px;
            min-height: 16px;
        }

        /* Token Panel */
        .token-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        .refresh-btn {
            cursor: pointer;
            color: var(--secondary);
            float: right;
            transition: 0.3s;
            background: transparent;
            border: 0;
            padding: 0;
            font: inherit;
        }
        .refresh-btn:hover { transform: rotate(180deg); }
        .refresh-btn.is-refreshing { animation: cyber-spin 0.8s linear infinite; }
        .permission-badge {
            margin-left: auto;
            border: 1px solid rgba(0, 242, 255, 0.45);
            color: var(--primary);
            background: rgba(0, 242, 255, 0.08);
            padding: 5px 9px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* Console */
        .console-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .log-terminal {
            flex: 1;
            background: #000;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
            color: #0f0;
        }
        .trace-shell {
            display: grid;
            grid-template-columns: minmax(260px, 1fr) minmax(260px, 0.9fr);
            gap: 12px;
        }
        .trace-panel,
        .tool-result-preview {
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.72);
            min-height: 110px;
            max-height: 190px;
            overflow-y: auto;
        }
        .trace-panel-header,
        .tool-result-preview-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
        }
        .trace-timeline {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
        }
        .trace-empty,
        .tool-result-empty {
            color: #6e7681;
            font-size: 12px;
        }
        .trace-event {
            border-left: 2px solid rgba(0, 242, 255, 0.55);
            padding: 7px 9px;
            background: rgba(0, 242, 255, 0.05);
        }
        .trace-event.error,
        .trace-event.tool-result {
            border-left-color: var(--secondary);
            background: rgba(255, 0, 255, 0.05);
        }
        .trace-event-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            color: #8b949e;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .trace-event-action {
            color: var(--primary);
            font-weight: 700;
        }
        .trace-event-body,
        .tool-result-preview pre {
            margin: 0;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        .tool-result-preview pre {
            padding: 10px;
        }
        .terminal-entry {
            margin: 10px 0;
            color: var(--primary);
        }
        .agent-reply {
            margin: 8px 0 14px 18px;
            padding: 12px;
            border-left: 1px solid var(--accent);
            background: rgba(88, 166, 255, 0.08);
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .agent-reply.error {
            border-left-color: var(--secondary);
            background: rgba(255, 0, 255, 0.08);
        }
        .agent-reply-label {
            display: block;
            margin-bottom: 6px;
            color: var(--primary);
            font-size: 11px;
        }
        .agent-progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 34px;
            margin: 0 0 12px 18px;
            padding: 8px 10px;
            border-left: 1px solid rgba(0, 242, 255, 0.45);
            color: var(--text);
            background: rgba(0, 242, 255, 0.04);
        }
        .agent-progress-row.complete {
            border-left-color: rgba(88, 166, 255, 0.65);
        }
        .agent-progress-row.failed {
            border-left-color: var(--secondary);
        }
        .agent-progress-spinner {
            width: 13px;
            height: 13px;
            border: 2px solid rgba(0, 242, 255, 0.9);
            border-top-color: transparent;
            border-radius: 50%;
            flex: 0 0 auto;
            animation: cyber-spin 0.85s linear infinite;
        }
        .agent-progress-row.complete .agent-progress-spinner,
        .agent-progress-row.failed .agent-progress-spinner {
            animation: none;
            border-top-color: rgba(0, 242, 255, 0.9);
        }
        .agent-progress-copy {
            min-width: 140px;
            font-size: 12px;
            line-height: 1.4;
        }
        .agent-progress-track {
            position: relative;
            flex: 1;
            height: 4px;
            min-width: 80px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
        }
        .agent-progress-track::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: -45%;
            width: 45%;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: agent-scan 1.1s ease-in-out infinite;
        }
        .agent-progress-row.complete .agent-progress-track::after,
        .agent-progress-row.failed .agent-progress-track::after {
            animation: none;
            left: 0;
            width: 100%;
            background: var(--accent);
        }
        .agent-progress-row.failed .agent-progress-track::after {
            background: var(--secondary);
        }
        @keyframes agent-scan {
            from { left: -45%; }
            to { left: 100%; }
        }
        .btn-execute {
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        /* User Panel */
        .user-panel {
            margin-top: auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            position: relative;
        }
        .user-avatar { width: 32px; height: 32px; background: var(--primary); color: black; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .user-popup {
            position: absolute; bottom: 60px; left: 0; width: 100%; background: #0c0c0c;
            border: 1px solid var(--primary); border-radius: 8px; display: none; flex-direction: column; padding: 10px; z-index: 200;
        }
        .popup-item { padding: 10px; font-size: 0.9em; transition: 0.2s; border-radius: 4px; }
        .popup-item:hover { background: rgba(0, 242, 255, 0.1); color: var(--primary); }
        .scene-switcher { position: fixed; top: 20px; right: 20px; background: #111; padding: 10px; border: 1px solid var(--border); z-index: 300; }
        @media (max-width: 900px) {
            .trace-shell {
                grid-template-columns: 1fr;
            }
            .permission-badge {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div id="cyber-tooltip"></div>

    <div class="scene-switcher" id="scene-switcher">
        <div class="header-container" style="font-size:0.7em;">
            <span class="en-title">SCENE</span>
            <div class="neon-dot" data-tip="[用途] 切換介面視覺風格。
[模式] 深色 (Cyber-Dark) / 淺色 (Standard-Light)"></div>
        </div>
        <select id="scene-select" style="font-size:0.7em;" onchange="changeScene(this.value)">
            <option value="dark">Cyber-Dark</option>
            <option value="light">Standard-Light</option>
        </select>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="header-container">
            <span class="logo-en">HERMES</span>
            <span class="logo-zh">核心</span>
            <div class="status-indicator" id="agent-status-badge">
                <div class="spinner"></div>
                <span id="status-text">READING...</span>
            </div>
            <div class="neon-dot" data-tip="Hermes 核心引擎：管理狀態機、記憶與執行邏輯。"></div>
        </div>
        
        <div class="setting-group" style="margin-top:10px;">
            <div class="header-container">
                <label data-i18n="model">引擎選擇</label>
                <div class="neon-dot" data-tip="[用途] 選擇 Hermes 的邏輯推理後端。
[範例] Llama3 適合本地極速執行；Claude 適合複雜架構規劃。"></div>
            </div>
            <select id="model-select">
                <option value="mock">Mock Demo</option>
                <option value="qwen3:14b">Qwen3 14B (Ollama)</option>
                <option value="llama3">Llama 3 (Ollama)</option>
                <option value="gemma3">Gemma 3 (Ollama)</option>
                <option value="qwen2.5">Qwen 2.5 (Ollama)</option>
            </select>
        </div>

        <div class="setting-group">
            <div class="header-container">
                <label>Ollama URL</label>
                <div class="neon-dot" data-tip="[用途] 指向本地 Ollama 服務。
[Windows] http://localhost:11434
[WSL2] 可填宿主機 IP，例如 http://192.168.1.228:11434"></div>
            </div>
            <input id="ollama-url" type="text" value="http://localhost:11434">
        </div>

        <div class="setting-group">
            <div class="header-container" style="justify-content:space-between;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <label data-i18n="temp">創造力 (TEMP)</label>
                    <div class="neon-dot" data-tip="[用途] 調整模型輸出的隨機性與創造力。
[範圍應用層]
- 0.0-0.5: 嚴謹模式（精確代碼、邏輯證明、數學計算）
- 0.7-1.0: 平衡模式（日常對話、任務規劃、專案摘要）
- 1.2-2.0: 創意模式（故事創作、腦力激盪、角色扮演）"></div>
                </div>
                <span id="temp-val">0.7</span>
            </div>
            <input type="range" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('temp-val').innerText=this.value">
        </div>

        <div class="token-panel">
            <div class="header-container" style="justify-content:space-between; margin-bottom:10px;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <label><span data-i18n="token">代幣消耗</span> <span id="token-status">0 / 100k</span></label>
                    <div class="neon-dot" data-tip="[用途] 監控目前會話的資源使用情況。"></div>
                </div>
                <button class="refresh-btn" id="refresh-dashboard" type="button" onclick="refreshDashboardNow()">↻</button>
            </div>
            <div style="height:4px; background:#222;"><div id="budget-bar" style="height:100%; width:0%; background:var(--primary);"></div></div>
        </div>

        <div class="setting-group">
            <div class="header-container">
                <label data-i18n="sys_prompt">系統提示詞</label>
                <div class="neon-dot" data-tip="[用途] 定義 Agent 的核心人格與行為框架。
[範例] 輸入 '你是一位具備 20 年經驗的系統架構師' 會使 Agent 輸出更具專業深度的設計。"></div>
            </div>
            <textarea id="sys-prompt" rows="5"></textarea>
            <div class="prompt-actions">
                <button class="mini-action-btn" type="button" onclick="saveSystemPrompt()">紀錄</button>
                <button class="mini-action-btn danger" type="button" onclick="clearSystemPrompt()">清除</button>
                <span class="prompt-save-status" id="prompt-save-status">未紀錄</span>
            </div>
        </div>

        <div class="user-panel" id="user-panel" onclick="toggleUserMenu()">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="user-avatar">ID</div>
                <div>
                    <div style="font-size:0.8em; color:var(--accent);">AGENT-01</div>
                    <div style="font-size:0.6em; color:#555;">SECURITY CLEARED</div>
                </div>
            </div>
            <div style="color:var(--primary); font-size:1.2em;">🔒</div>

            <div class="user-popup" id="user-popup" onclick="event.stopPropagation()">
                <div class="popup-item">
                    <label style="font-size:0.8em; display:block; margin-bottom:5px;">Language / 語言</label>
                    <select id="lang-select" style="width:100%;" onchange="changeLang(this.value)">
                        <option value="zh">繁體中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="popup-item">⚙️ <span data-i18n="p_set">User Settings</span></div>
                <div class="popup-item" style="color:var(--secondary);">🚫 Logout</div>
            </div>
        </div>
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="main-content">
        <div class="console-card">
            <div class="header-container">
                <h3 class="en-title">TERMINAL</h3>
                <span class="logo-zh" style="font-size:0.9em;">終端機</span>
                <span class="permission-badge" id="permission-badge">MODE: READ_ONLY</span>
                <div class="neon-dot"></div>
            </div>
            <textarea id="task-input" rows="4" placeholder="Enter command..."></textarea>
            <button class="btn-execute" onclick="sendTask()" data-i18n="run">啟動代理</button>
            <div class="trace-shell">
                <div class="trace-panel">
                    <div class="trace-panel-header">
                        <span>TRACE TIMELINE</span>
                        <span>READ ONLY</span>
                    </div>
                    <div class="trace-timeline" id="trace-timeline">
                        <div class="trace-empty">尚無 Runtime Trace</div>
                    </div>
                </div>
                <div class="tool-result-preview" id="tool-result-preview">
                    <div class="tool-result-preview-title">
                        <span>TOOL RESULT PREVIEW</span>
                        <span>SAFE VIEW</span>
                    </div>
                    <pre id="tool-result-preview-body" class="tool-result-empty">尚無工具結果</pre>
                </div>
            </div>
            <div class="log-terminal" id="terminal"></div>
        </div>
    </div>

    <script>
        const i18n = {
            zh: { lang: "語言設定", model: "引擎選擇", temp: "創造力 (TEMP)", token: "代幣消耗", sys_prompt: "系統提示詞", run: "啟動代理", p_set: "使用者設定" },
            en: { lang: "LANGUAGE", model: "ENGINE", temp: "TEMPERATURE", token: "TOKEN USAGE", sys_prompt: "SYSTEM ROLE", run: "RUN AGENT", p_set: "Settings" }
        };
        const SYSTEM_PROMPT_STORAGE_KEY = 'hermes_system_prompt';

        function changeScene(scene) {
            const body = document.body;
            if (scene === 'light') {
                document.documentElement.style.setProperty('--bg', '#ffffff');
                document.documentElement.style.setProperty('--card', '#f0f0f0');
                document.documentElement.style.setProperty('--text', '#000000');
                document.documentElement.style.setProperty('--border', '#cccccc');
                document.documentElement.style.setProperty('--primary', '#0055ff');
                body.style.backgroundImage = 'none';
            } else {
                document.documentElement.style.setProperty('--bg', '#050505');
                document.documentElement.style.setProperty('--card', '#0c0c0c');
                document.documentElement.style.setProperty('--text', '#c9d1d9');
                document.documentElement.style.setProperty('--border', '#1a1a1a');
                document.documentElement.style.setProperty('--primary', '#00f2ff');
                body.style.backgroundImage = 'radial-gradient(circle at 50% 50%, #111 0%, #050505 100%)';
            }
        }

        const tooltip = document.getElementById('cyber-tooltip');
        document.addEventListener('mouseover', (e) => {
            const tip = e.target.getAttribute('data-tip');
            if (tip) {
                tooltip.innerText = tip;
                tooltip.style.display = 'block';
            }
        });
        document.addEventListener('mousemove', (e) => {
            if (tooltip.style.display === 'block') {
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
            }
        });
        document.addEventListener('mouseout', (e) => {
            if (e.target.getAttribute('data-tip')) { tooltip.style.display = 'none'; }
        });

        function toggleUserMenu() {
            const popup = document.getElementById('user-popup');
            const isVisible = popup.style.display === 'flex';
            popup.style.display = isVisible ? 'none' : 'flex';
        }

        function changeLang(lang) {
            localStorage.setItem('hermes_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(i18n[lang][key]) el.innerText = i18n[lang][key];
            });
        }

        function setPromptSaveStatus(text) {
            const status = document.getElementById('prompt-save-status');
            if (status) status.innerText = text;
        }

        function saveSystemPrompt() {
            const prompt = document.getElementById('sys-prompt').value;
            localStorage.setItem(SYSTEM_PROMPT_STORAGE_KEY, prompt);
            setPromptSaveStatus(prompt.trim() ? '已紀錄' : '已紀錄空白提示詞');
        }

        function clearSystemPrompt() {
            document.getElementById('sys-prompt').value = '';
            localStorage.removeItem(SYSTEM_PROMPT_STORAGE_KEY);
            setPromptSaveStatus('已清除');
        }

        function loadSystemPrompt() {
            const savedPrompt = localStorage.getItem(SYSTEM_PROMPT_STORAGE_KEY);
            if (savedPrompt !== null) {
                document.getElementById('sys-prompt').value = savedPrompt;
                setPromptSaveStatus(savedPrompt.trim() ? '已載入紀錄' : '已載入空白提示詞');
            }
        }

        const sidebar = document.getElementById('sidebar');
        const resizer = document.getElementById('resizer');
        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => { isResizing = true; });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let width = e.clientX;
            if (width > 200 && width < 500) sidebar.style.width = width + 'px';
        });
        document.addEventListener('mouseup', () => { isResizing = false; });

        let lastRenderedResultKey = "";

        function getResultKey(result) {
            if (!result) return "";
            return `${result.status || ''}|${result.task || ''}|${result.response || ''}|${result.error || ''}`;
        }

        async function updateDashboard(options = {}) {
            const refreshBtn = document.getElementById('refresh-dashboard');
            if (refreshBtn) refreshBtn.classList.add('is-refreshing');
            try {
                const resp = await fetch('/api/status');
                if (!resp.ok) throw new Error(`Status API ${resp.status}`);
                const data = await resp.json();
                
                // 更新 Token 狀態
                const current = data?.metrics?.metrics?.token_usage?.total || 0;
                document.getElementById('token-status').innerText = `${current} / 100k`;
                const percent = (current / 100000) * 100;
                document.getElementById('budget-bar').style.width = percent + '%';

                // 更新執行狀態標籤與轉圈圈
                const badge = document.getElementById('agent-status-badge');
                const statusText = document.getElementById('status-text');
                if (data.is_running) {
                    badge.classList.add('active');
                    statusText.innerText = data.current_state;
                } else {
                    badge.classList.remove('active');
                }

                if (options.renderResult && data.last_result && data.last_result.status !== 'IDLE' && data.last_result.status !== 'RUNNING') {
                    appendAgentReply(document.getElementById('terminal'), data.last_result, { dedupe: true });
                }
            } catch (e) {
                document.getElementById('token-status').innerText = '刷新失敗';
            } finally {
                if (refreshBtn) refreshBtn.classList.remove('is-refreshing');
            }
        }

        async function refreshDashboardNow() {
            const refreshBtn = document.getElementById('refresh-dashboard');
            if (refreshBtn) refreshBtn.classList.add('is-refreshing');
            try {
                const resp = await fetch('/api/metrics/reset', { method: 'POST' });
                if (!resp.ok) throw new Error(`Reset API ${resp.status}`);
            } catch (e) {
                document.getElementById('token-status').innerText = '重置失敗';
            } finally {
                if (refreshBtn) refreshBtn.classList.remove('is-refreshing');
            }
            updateDashboard({ renderResult: true });
        }

        function appendUserCommand(terminal, task) {
            const entry = document.createElement('div');
            entry.className = 'terminal-entry';
            entry.textContent = `>> [USER_CMD] ${task}`;
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function appendAgentProgress(terminal, text) {
            const row = document.createElement('div');
            row.className = 'agent-progress-row';

            const spinner = document.createElement('div');
            spinner.className = 'agent-progress-spinner';

            const copy = document.createElement('div');
            copy.className = 'agent-progress-copy';
            copy.textContent = text;

            const track = document.createElement('div');
            track.className = 'agent-progress-track';

            row.appendChild(spinner);
            row.appendChild(copy);
            row.appendChild(track);
            terminal.appendChild(row);
            terminal.scrollTop = terminal.scrollHeight;
            return row;
        }

        function appendAgentReply(terminal, result, options = {}) {
            if (!terminal || !result) return;
            const key = getResultKey(result);
            if (options.dedupe && key && key === lastRenderedResultKey) return;

            const row = document.createElement('div');
            row.className = result.error ? 'agent-reply error' : 'agent-reply';

            const label = document.createElement('span');
            label.className = 'agent-reply-label';
            label.textContent = result.error ? '<< [HERMES_ERROR]' : '<< [HERMES_REPLY]';

            const body = document.createElement('div');
            body.textContent = result.error || result.response || 'Hermes 沒有產生文字回覆。';

            row.appendChild(label);
            row.appendChild(body);
            terminal.appendChild(row);
            lastRenderedResultKey = key;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateAgentProgress(row, text, state) {
            if (!row) return;
            const copy = row.querySelector('.agent-progress-copy');
            copy.textContent = text;
            row.classList.remove('complete', 'failed');
            if (state) row.classList.add(state);
        }

        function getLogTime(log) {
            if (!log.timestamp) return '--:--:--';
            const parts = String(log.timestamp).split('T');
            if (parts.length < 2) return String(log.timestamp);
            return parts[1].split('.')[0];
        }

        function formatTraceData(data) {
            if (data === undefined || data === null) return '';
            if (typeof data === 'string') return data;
            try {
                return JSON.stringify(data, null, 2);
            } catch (e) {
                return String(data);
            }
        }

        function getTraceEventKind(action, data) {
            const normalized = String(action || '').toLowerCase();
            if (normalized.includes('error') || data?.error) return 'error';
            if (normalized.includes('tool_result') || normalized.includes('tool result')) return 'tool-result';
            if (normalized.includes('tool_call') || normalized.includes('tool call')) return 'tool-call';
            return 'state';
        }

        function renderTraceTimeline(logs) {
            const timeline = document.getElementById('trace-timeline');
            if (!timeline) return;
            timeline.replaceChildren();
            if (!logs || logs.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'trace-empty';
                empty.textContent = '尚無 Runtime Trace';
                timeline.appendChild(empty);
                return;
            }

            logs.slice(-12).forEach(log => {
                const event = document.createElement('div');
                event.className = `trace-event ${getTraceEventKind(log.action, log.data)}`;

                const meta = document.createElement('div');
                meta.className = 'trace-event-meta';

                const time = document.createElement('span');
                time.textContent = `[${getLogTime(log)}]`;
                const state = document.createElement('span');
                state.textContent = log.state || 'UNKNOWN';
                const action = document.createElement('span');
                action.className = 'trace-event-action';
                action.textContent = log.action || 'TRACE';

                meta.appendChild(time);
                meta.appendChild(state);
                meta.appendChild(action);

                const body = document.createElement('pre');
                body.className = 'trace-event-body';
                body.textContent = formatTraceData(log.data);

                event.appendChild(meta);
                event.appendChild(body);
                timeline.appendChild(event);
            });
            timeline.scrollTop = timeline.scrollHeight;
        }

        function getLatestToolResult(logs) {
            if (!logs) return null;
            for (let i = logs.length - 1; i >= 0; i--) {
                const log = logs[i];
                const kind = getTraceEventKind(log.action, log.data);
                if (kind === 'tool-result' || log.data?.tool_result || log.data?.result) {
                    return log;
                }
            }
            return null;
        }

        function renderToolResultPreview(logs) {
            const previewBody = document.getElementById('tool-result-preview-body');
            if (!previewBody) return;
            const latestToolResult = getLatestToolResult(logs);
            previewBody.classList.toggle('tool-result-empty', !latestToolResult);
            previewBody.textContent = latestToolResult
                ? formatTraceData(latestToolResult.data?.tool_result || latestToolResult.data?.result || latestToolResult.data)
                : '尚無工具結果';
        }

        async function updateLogs() {
            try {
                const resp = await fetch('/api/logs');
                const logs = await resp.json();
                renderTraceTimeline(logs);
                renderToolResultPreview(logs);
            } catch (e) {}
        }

        async function sendTask() {
            const btn = document.querySelector('.btn-execute');
            const taskInput = document.getElementById('task-input');
            const task = taskInput.value;
            const terminal = document.getElementById('terminal');
            const selectedModel = document.getElementById('model-select').value;
            const provider = selectedModel === 'mock' ? 'mock' : 'ollama';
            const model = selectedModel === 'mock' ? null : selectedModel;
            const baseUrl = document.getElementById('ollama-url').value.trim() || 'http://localhost:11434';
            const temperature = Number(document.getElementById('temp-val').innerText) || 0.7;
            const systemPrompt = document.getElementById('sys-prompt').value;
            
            if(!task) return;
            
            btn.innerText = "EXECUTING...";
            btn.style.opacity = "0.5";
            appendUserCommand(terminal, task);
            taskInput.value = '';
            taskInput.focus();
            saveSystemPrompt();

            let progressRow = appendAgentProgress(terminal, '正在送交 Hermes');
            try {
                const taskResp = await fetch('/api/task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        task: task,
                        provider: provider,
                        model: model,
                        base_url: baseUrl,
                        temperature: temperature,
                        system_prompt: systemPrompt
                    })
                });

                if (!taskResp.ok) {
                    let detail = `Hermes rejected the task (${taskResp.status})`;
                    try {
                        const errorPayload = await taskResp.json();
                        detail = errorPayload.detail || errorPayload.message || detail;
                    } catch (parseError) {}
                    throw new Error(detail);
                }

                updateAgentProgress(progressRow, 'Hermes 已讀取指令，正在執行');
                const payload = await taskResp.json();
                if (payload.result) {
                    const state = payload.result.status === 'DONE' ? 'complete' : 'failed';
                    const text = payload.result.status === 'DONE' ? 'Hermes 執行完成' : 'Hermes 執行未完成';
                    updateAgentProgress(progressRow, text, state);
                    appendAgentReply(terminal, payload.result, { dedupe: true });
                    await updateLogs();
                    await updateDashboard();
                    btn.innerText = "啟動代理";
                    btn.style.opacity = "1";
                    return;
                }
            } catch (e) {
                updateAgentProgress(progressRow, 'Hermes 未成功接收指令', 'failed');
                appendAgentReply(terminal, {
                    status: 'FAILED',
                    task: task,
                    response: '',
                    error: e.message || 'Hermes 未成功接收指令'
                }, { dedupe: true });
                await updateLogs();
                await updateDashboard();
                btn.innerText = "啟動代理";
                btn.style.opacity = "1";
                return;
            }
            
            // 任務發送後立即開始高頻輪詢
            const logInterval = setInterval(async () => {
                try {
                    await updateLogs();
                    const statusResp = await fetch('/api/status');
                    const status = await statusResp.json();
                    updateAgentProgress(progressRow, `Hermes 執行中：${status.current_state}`);

                    if (status.current_state === 'DONE' || status.current_state === 'FAILED') {
                        const state = status.current_state === 'DONE' ? 'complete' : 'failed';
                        const text = status.current_state === 'DONE' ? 'Hermes 執行完成' : 'Hermes 執行失敗';
                        updateAgentProgress(progressRow, text, state);
                        if (status.last_result) {
                            appendAgentReply(terminal, status.last_result, { dedupe: true });
                        }
                        clearInterval(logInterval);
                        btn.innerText = "啟動代理";
                        btn.style.opacity = "1";
                    }
                } catch (e) {
                    updateAgentProgress(progressRow, 'Hermes 狀態讀取中斷', 'failed');
                    clearInterval(logInterval);
                    btn.innerText = "啟動代理";
                    btn.style.opacity = "1";
                }
            }, 1000);
        }

        const savedLang = localStorage.getItem('hermes_lang') || 'zh';
        document.getElementById('lang-select').value = savedLang;
        loadSystemPrompt();
        document.getElementById('sys-prompt').addEventListener('input', saveSystemPrompt);
        changeLang(savedLang);
        setInterval(updateDashboard, 5000);
        setInterval(updateLogs, 3000);
        updateLogs();
    </script>
</body>
</html>
